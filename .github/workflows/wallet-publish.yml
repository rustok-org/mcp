name: Wallet Image Publish

# Builds the all-in-one self-custody wallet image (Core + Gateway + MCP, spoken
# over stdio) and pushes it to GHCR. The Core/Gateway binaries come FROM the
# private rustok-core image, which this PUBLIC repo's CI cannot pull without
# being granted read access to the proprietary core package — and wallet/core
# are versioned independently, so `rustok-core:<wallet-tag>` need not exist.
#
# Wallet images are therefore published MANUALLY by design:
#   docker build -f Dockerfile.wallet \
#     --build-arg CORE_IMAGE=ghcr.io/<owner>/rustok-core:<core-tag> -t ... .
#   docker push ...
#
# This workflow is kept as a manual-trigger scaffold only (workflow_dispatch).
# Do NOT re-enable it on tags without first wiring private-core CI read access
# and aligning the core/wallet version tags — otherwise it fails at `FROM` with
# a 403 on the (non-existent / inaccessible) rustok-core:<tag>.

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rustok-wallet

concurrency:
  group: wallet-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push wallet image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
          labels: |
            org.opencontainers.image.title=rustok-wallet
            org.opencontainers.image.description=Rustok self-custody Ethereum agent wallet (all-in-one MCP, stdio)
            org.opencontainers.image.licenses=LicenseRef-Proprietary

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile.wallet
          build-args: |
            CORE_IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/rustok-core:${{ github.ref_name }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
