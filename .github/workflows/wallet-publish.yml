name: Wallet Image Publish

# Builds the all-in-one self-custody wallet image (Core + Gateway + MCP + the
# human-approval console, spoken over stdio) and pushes it to GHCR. The base-image
# pins (rustok-core / rustok-console versions) live ONLY in Dockerfile.wallet —
# this workflow does not override them.
#
# Manual-trigger by design (workflow_dispatch). Preconditions for a green run:
#   - the ghcr.io/rustok-org/rustok-core package is PUBLIC — this public repo's
#     GITHUB_TOKEN cannot pull a private package, so the build fails at `FROM`
#     (flipping visibility is a Captain op; core PR #90 names it a precondition);
#   - the pinned ghcr.io/rustok-org/rustok-console image is published and public.
# Fallback (break-glass): if CI cannot build (e.g. a base image is briefly
# unreachable), build + push manually from an authorized machine — but the image
# MUST still be signed by THIS workflow's identity, or install.sh's `cosign verify`
# (which pins that one identity) rejects it for every user. Do NOT sign from the
# laptop: a local run cannot reproduce the workflow's keyless OIDC identity, and a
# second signer (a personal Sigstore account) would force verify to trust two
# identities.
#
# The recovery is a re-run of THIS workflow with `allow_existing_tag: true` — and
# be precise about what that does: it does NOT bless the bytes the laptop pushed.
# It rebuilds from this workflow's own checkout and REPLACES the tag with the
# result, which is then signed. Laptop-pushed bytes are discarded, never adopted;
# there is no path by which unsigned bytes acquire this identity retroactively.
# Same mechanism covers a plain retry (build pushed the tags, the cosign step
# failed) — without the opt-in, the tag guard below stops the re-run.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Wallet image version — digits only, no leading v (e.g. 0.5.0); must match pyproject.toml"
        required: true
        type: string
      allow_existing_tag:
        description: "Republish over an EXISTING v<version> tag — rebuilds and REPLACES it. Only for break-glass or a failed-signing retry."
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rustok-wallet-tui

concurrency:
  group: wallet-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write # keyless cosign signing via the GitHub OIDC token

jobs:
  build-and-push:
    name: Build and push wallet image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The published tag must be the version the manifests actually carry —
      # this repo has already shipped a manifest/tag drift once (0.3.2 vs 0.4.x).
      - name: Verify version matches pyproject.toml
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          MANIFEST_VERSION=$(sed -n 's/^version = "\(.*\)"$/\1/p' pyproject.toml | head -n 1)
          if [ "$INPUT_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::input version '$INPUT_VERSION' does not match pyproject.toml version '$MANIFEST_VERSION'"
            exit 1
          fi

      # A published version tag is a promise about specific bytes. This workflow
      # pushes three tags (v<version>, v<major>.<minor>, v<major>) and, before
      # this guard, would happily repoint ALL of them at a fresh build — so
      # dispatching an already-released number silently rewrote what that release
      # means. Only the FULL version tag is checked: the floating v<major> and
      # v<major>.<minor> are meant to move, and guarding them would refuse every
      # release from here on (v0 has existed since 0.5.0).
      - name: Refuse to overwrite a published version tag
        if: ${{ !inputs.allow_existing_tag }}
        env:
          INPUT_VERSION: ${{ inputs.version }}
          IMAGE: ${{ env.IMAGE_NAME }}
        run: |
          # Deliberately the tags LIST, not a manifest HEAD: a manifest request
          # answers 404 for a tag that exists when the Accept header does not
          # name its media type — i.e. a published tag can masquerade as free and
          # the guard would wave the overwrite through. The list endpoint is
          # media-type agnostic. (Verified against this very registry: v0 and
          # v0.7 exist, yet a manifest request with a narrow Accept returns 404.)
          TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:${IMAGE}:pull&service=ghcr.io" | jq -r .token)
          PAGE=1000
          TAGS=$(curl -fsSL -H "Authorization: Bearer $TOKEN" \
            "https://ghcr.io/v2/${IMAGE}/tags/list?n=${PAGE}") \
            || { echo "::error::could not list tags for ${IMAGE} — refusing to publish blind"; exit 1; }
          # Fail closed on a truncated page. GHCR paginates (verified: ?n=3
          # returns the first three tags plus `Link: …rel="next"`), and it cuts
          # the TAIL — which is exactly where new tags live. A silently truncated
          # list would omit the very tag we are asking about and report it free.
          COUNT=$(printf '%s' "$TAGS" | jq '.tags // [] | length')
          if [ "$COUNT" -ge "$PAGE" ]; then
            echo "::error::tag list came back at the page limit ($COUNT) and may be truncated — the tail is where new tags are, so this check cannot be trusted. Raise n or follow the Link header."
            exit 1
          fi
          if printf '%s' "$TAGS" | jq -e --arg t "v${INPUT_VERSION}" '.tags // [] | index($t)' >/dev/null; then
            echo "::error::v${INPUT_VERSION} is already published — republishing would rebuild it and move v${INPUT_VERSION} (and the floating tags) to different bytes. Release a new version, or re-run with allow_existing_tag if you are deliberately replacing it (break-glass / signing retry)."
            exit 1
          fi
          echo "v${INPUT_VERSION} is unpublished — proceeding."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}},value=v${{ inputs.version }}
            type=semver,pattern=v{{major}}.{{minor}},value=v${{ inputs.version }}
            type=semver,pattern=v{{major}},value=v${{ inputs.version }}
          labels: |
            org.opencontainers.image.title=rustok-wallet-tui
            org.opencontainers.image.description=Rustok self-custody Ethereum agent wallet (all-in-one MCP, stdio)
            org.opencontainers.image.licenses=LicenseRef-Proprietary

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile.wallet
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      # Sign the image by DIGEST (the immutable identity every tag points at), so
      # one signature covers all pushed tags. Keyless: the signer's identity is
      # this workflow's OIDC token — no key material to store or rotate. Anyone
      # can later `cosign verify` that the wallet image came from this repo's CI.
      - name: Sign the image (keyless, GitHub OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # Anti-vacuous: verify the signature we just made, pinned to THIS workflow's
      # identity. A misconfigured signing step (wrong permissions, wrong identity)
      # fails here instead of shipping an image that only looks signed.
      - name: Verify the signature
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/wallet-publish.yml@${{ github.ref }}
        run: |
          cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-identity "${IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            > /dev/null
          echo "signed & verified: ${IMAGE}@${DIGEST}" >> "$GITHUB_STEP_SUMMARY"
