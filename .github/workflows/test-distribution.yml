name: Test Distribution

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run shellcheck
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/*.sh
          else
            docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:stable scripts/*.sh
          fi

  install-script-syntax:
    name: Install Script Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Test install script parses without errors
        run: bash -n scripts/install.sh

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run hadolint
        run: docker run --rm -i ghcr.io/hadolint/hadolint hadolint - < Dockerfile

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Create dummy binary for build test
        run: |
          echo '#!/bin/sh' > rustok-agent-mcp
          echo 'echo "rustok-agent-mcp v0.0.0-test"' >> rustok-agent-mcp
          chmod +x rustok-agent-mcp
      - name: Build Docker image
        run: docker build -t rustok-mcp:test .
      - name: Verify image runs
        run: docker run --rm rustok-mcp:test --help || true
