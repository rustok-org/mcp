name: Test Distribution

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run shellcheck
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/*.sh
          else
            docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:stable scripts/*.sh
          fi

  install-script-syntax:
    name: Install Script Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Test install script parses without errors
        run: bash -n scripts/install.sh

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run hadolint
        run: docker run --rm -i ghcr.io/hadolint/hadolint hadolint - < Dockerfile

  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build Docker image
        run: docker build -t rustok-mcp:test .
      - name: Verify server starts and /health responds
        run: |
          docker run -d --name mcp-smoke \
            -e RUSTOK_MCP_HOST=0.0.0.0 \
            -p 127.0.0.1:3001:3001 \
            rustok-mcp:test
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3001/health; then
              echo "health OK"
              docker rm -f mcp-smoke
              exit 0
            fi
            sleep 2
          done
          echo "health check never came up" >&2
          docker logs mcp-smoke >&2
          docker rm -f mcp-smoke
          exit 1
