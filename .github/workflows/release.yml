name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - id: x86_64-linux
            ext: tar.gz
          - id: aarch64-linux
            ext: tar.gz
          - id: x86_64-darwin
            ext: tar.gz
          - id: aarch64-darwin
            ext: tar.gz
          - id: x86_64-windows
            ext: zip
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build dummy artifact for CI testing
        run: |
          BINARY="rustok-agent-mcp"
          ARTIFACT="${BINARY}-${{ matrix.target.id }}"
          mkdir -p dist
          if [ "${{ matrix.target.id }}" = "x86_64-windows" ]; then
            echo "@echo off" > "dist/${BINARY}.exe"
            echo "echo rustok-agent-mcp v0.0.0-test" >> "dist/${BINARY}.exe"
            cd dist
            zip "${ARTIFACT}.zip" "${BINARY}.exe"
          else
            echo '#!/bin/sh' > "dist/${BINARY}"
            echo 'echo "rustok-agent-mcp v0.0.0-test"' >> "dist/${BINARY}"
            chmod +x "dist/${BINARY}"
            cd dist
            tar czf "${ARTIFACT}.tar.gz" "${BINARY}"
          fi
      - name: Generate checksum
        run: |
          cd dist
          if [ "${{ matrix.target.id }}" = "x86_64-windows" ]; then
            sha256sum "${{ matrix.target.id }}.zip" > "${{ matrix.target.id }}.zip.sha256"
          else
            sha256sum "${{ matrix.target.id }}.tar.gz" > "${{ matrix.target.id }}.tar.gz.sha256"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: artifact-${{ matrix.target.id }}
          path: dist/*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-artifacts
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Download all artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f91f0de96 # v4.2.0
        with:
          path: artifacts
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@c95fe14e6d4d2b97eb24b453fd3fbb9311aab2b1 # v2.2.1
        with:
          files: artifacts/*
          generate_release_notes: false
          body: |
            See [CHANGELOG.md](https://github.com/rustok-org/mcp/blob/main/CHANGELOG.md) for details.
