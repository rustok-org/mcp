name: MCP CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          python-version-file: ".python-version"
      - run: uv sync --dev
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests
      - run: uv run mypy src

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          python-version-file: ".python-version"
      - run: uv sync --dev
      - run: uv run pytest

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run shellcheck
        run: |
          FILES="scripts/*.sh cli/rustok tests/shim/run-tests.sh tests/shim/stub-bin/podman tests/shim/stub-bin/claude tests/install/run-tests.sh tests/install/stub-bin/curl tests/install/stub-bin/podman tests/install/stub-bin/cosign"
          if command -v shellcheck >/dev/null 2>&1; then
            # shellcheck disable=SC2086
            shellcheck $FILES
          else
            docker run --rm -v "$PWD:/mnt" koalaman/shellcheck:stable $FILES
          fi

  shim-tests:
    name: Shim Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run the shim test suite (stub engine, no containers needed)
        run: sh tests/shim/run-tests.sh

  install-tests:
    name: Install Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run the installer test suite (stub curl/engine/cosign, no network)
        run: sh tests/install/run-tests.sh
