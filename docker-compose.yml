services:
  rustok-mcp:
    image: ghcr.io/rustok-org/rustok-mcp:v0.2
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY_PATH: ${BINARY_PATH:-rustok-agent-mcp}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - rustok-data:/home/rustok/.rustok/agent
    environment:
      RUSTOK_AGENT_PASSWORD: ${RUSTOK_AGENT_PASSWORD}
      MCP_CHAIN_IDS: ${MCP_CHAIN_IDS:-421614}
      MCP_RATE_LIMIT: ${MCP_RATE_LIMIT:-100}
      MCP_API_KEY: ${MCP_API_KEY}
    # Hardening
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    user: "1000:1000"
    restart: unless-stopped

volumes:
  rustok-data:
