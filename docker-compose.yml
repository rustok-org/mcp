services:
  rustok-mcp:
    image: ghcr.io/rustok-org/rustok-mcp:v0.2
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      RUSTOK_MCP_HOST: "0.0.0.0"
      RUSTOK_MCP_PORT: "3001"
      RUSTOK_MCP_GATEWAY_URL: "http://host.docker.internal:3000"
      RUSTOK_MCP_LOG_LEVEL: "INFO"
    # Hardening
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    user: "1000:1000"
    restart: unless-stopped
